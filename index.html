<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0A0A0F" />
    <title>가계부</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      :root {
        --bg-page: #ffffff;
        --bg-surface: #ffffff;
        --text: #1f2330;
        --text-sub: rgba(31, 35, 48, 0.58);
        --text-muted: rgba(31, 35, 48, 0.35);
        --border-soft: rgba(0, 0, 0, 0.06);
        --input-bg: #f6f7f9;
        --nav-bg: rgba(255, 255, 255, 0.96);
        --overlay-bg: rgba(0, 0, 0, 0.45);
        --income: #00b87a;
        --expense: #f24565;
        --accent: #2dc7b0;
        --accent-soft: rgba(45, 199, 176, 0.12);
      }

      [data-theme="dark"] {
        --bg-page: #0e1220;
        --bg-surface: #171b2d;
        --text: #eceef5;
        --text-sub: rgba(236, 238, 245, 0.72);
        --text-muted: rgba(236, 238, 245, 0.45);
        --border-soft: rgba(255, 255, 255, 0.08);
        --input-bg: rgba(255, 255, 255, 0.08);
        --nav-bg: rgba(14, 18, 32, 0.92);
        --overlay-bg: rgba(0, 0, 0, 0.6);
        --income: #53e6ba;
        --expense: #ff9ab1;
        --accent: #6ee7d8;
        --accent-soft: rgba(110, 231, 216, 0.2);
      }

      body { background: var(--bg-page); color: var(--text); padding-top: env(safe-area-inset-top); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
